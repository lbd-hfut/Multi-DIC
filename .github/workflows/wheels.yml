name: Build wheels
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/workflows/wheels.yml"
      - "pyproject.toml"
      - "CMakeLists.txt"
      - "native/**"
      - "multidic/**"
      - "pymultidic/**"
jobs:
  build-wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            cibw_archs: AMD64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Install Windows COLMAP deps
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m pip install --no-deps mkl-static==2026.1.0
          New-Item -ItemType Directory -Force -Path C:\mkl-static | Out-Null
          Copy-Item -LiteralPath "$env:pythonLocation\Library\lib\mkl_intel_lp64.lib" -Destination C:\mkl-static
          Copy-Item -LiteralPath "$env:pythonLocation\Library\lib\mkl_sequential.lib" -Destination C:\mkl-static
          Copy-Item -LiteralPath "$env:pythonLocation\Library\lib\mkl_core.lib" -Destination C:\mkl-static
          vcpkg install `
            boost-graph:x64-windows `
            boost-heap:x64-windows `
            boost-program-options:x64-windows `
            ceres:x64-windows `
            eigen3:x64-windows `
            flann:x64-windows `
            freeimage:x64-windows `
            glew:x64-windows `
            glog:x64-windows `
            metis:x64-windows `
            openimageio:x64-windows `
            sqlite3:x64-windows `
            suitesparse:x64-windows
          "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VCPKG_TARGET_TRIPLET=x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23.3
        env:
          CIBW_BUILD: "cp312-*"
          CIBW_ARCHS: "${{ matrix.cibw_archs }}"
          CIBW_SKIP: "*-win32"
          CIBW_ENVIRONMENT_WINDOWS: "CMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake VCPKG_TARGET_TRIPLET=x64-windows CMAKE_ARGS='-DBLA_VENDOR=Intel10_64lp_seq -DBLAS_LIBRARIES=C:/mkl-static/mkl_intel_lp64.lib;C:/mkl-static/mkl_sequential.lib;C:/mkl-static/mkl_core.lib -DLAPACK_LIBRARIES=C:/mkl-static/mkl_intel_lp64.lib;C:/mkl-static/mkl_sequential.lib;C:/mkl-static/mkl_core.lib'"
          CIBW_BEFORE_BUILD_WINDOWS: "pip install delvewheel"
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: "delvewheel repair -w {dest_dir} {wheel} --add-path C:/vcpkg/installed/x64-windows/bin;C:/vcpkg/installed/x64-windows/debug/bin -v"
          CIBW_TEST_COMMAND: "python -c \"import pymultidic, native_colmap, native_recon3d; print(pymultidic.__version__); print(native_colmap.capabilities()); print(native_recon3d.__doc__)\""
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
  build-linux-wheel:
    name: Wheel on Linux x86_64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Linux COLMAP dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libboost-graph-dev \
            libceres-dev \
            libeigen3-dev \
            libgoogle-glog-dev \
            libmetis-dev \
            libsqlite3-dev \
            libsuitesparse-dev \
            ninja-build \
            patchelf \
            python3-dev
          python -m pip install --upgrade build auditwheel
      - name: Build Linux wheel
        run: |
          python -m build --wheel --outdir wheelhouse-raw
          auditwheel show wheelhouse-raw/*.whl
          auditwheel repair wheelhouse-raw/*.whl \
            --wheel-dir wheelhouse \
            --plat manylinux_2_39_x86_64
      - name: Test repaired Linux wheel
        run: |
          python -m venv .wheel-test
          .wheel-test/bin/python -m pip install --no-deps wheelhouse/*.whl
          .wheel-test/bin/python -c "import native_colmap, native_recon3d; print(native_colmap.capabilities()); print(native_recon3d.__doc__)"
          test -x .wheel-test/lib/python3.12/site-packages/pymultidic/bin/ncorr_cli
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: wheelhouse/*.whl
  build-sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist
        run: |
          python -m pip install --upgrade build
          python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
  github-release:
    name: GitHub Release
    needs: [build-wheels, build-linux-wheel, build-sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-dist
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-dist/*
  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels, build-linux-wheel, build-sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
