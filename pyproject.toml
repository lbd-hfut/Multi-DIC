[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "multi-dic"
version = "0.1.0"
description = "Config-driven calibration-free multi-view DIC workflow."
requires-python = ">=3.10"
dependencies = [
  "PyYAML>=6.0",
]

[tool.setuptools.packages.find]
include = ["multidic*"]
